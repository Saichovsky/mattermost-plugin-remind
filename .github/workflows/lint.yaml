name: Mattermost Plugin CI

on:
  pull_request:
    branches:
      - master
  push:
    tags:
      - "v*"

env:
  PATH: ${{ env.PATH }}:$HOME/go/bin

jobs:
  lint-and-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Run tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1

      - name: Check style
        run: make check-style

      - name: Run tests
        run: make test

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Test and build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1

      - name: Run build
        run: make
